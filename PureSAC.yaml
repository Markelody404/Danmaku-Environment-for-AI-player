behaviors:
  DanmakuAgent:
    trainer_type: sac
    hyperparameters:
      learning_rate: 0.0003
      learning_rate_schedule: constant 
      batch_size: 256                   
      buffer_size: 500000              
      buffer_init_steps: 10000          
      tau: 0.005                        
      steps_per_update: 10              
      init_entcoef: 0.1               
      normalize: true
      hidden_units: 256
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 5
    max_steps: 50000000            
    summary_freq: 50000