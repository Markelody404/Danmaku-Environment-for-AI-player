behaviors:
  DanmakuPPO:
    trainer_type: ppo
    hyperparameters:
      batch_size: 4096       # INCREASED: Better stability for 60 parallel agents
      buffer_size: 40960     # INCREASED: 10x batch size
      learning_rate: 0.00015 # HALVED: Safer, smaller steps to prevent the 2.5M crash
      beta: 0.0005
      epsilon: 0.2
      lambd: 0.95 
      num_epoch: 5 
      shared_critic: False
      learning_rate_schedule: linear
      beta_schedule: linear
      epsilon_schedule: linear
    checkpoint_interval: 500000
    network_settings:
      normalize: True 
      hidden_units: 512 
      num_layers: 3 
      vis_encode_type: simple
      goal_conditioning_type: hyper
      deterministic: False
    reward_signals:
      extrinsic:
        gamma: 0.995 
        strength: 1.0
        network_settings:
          hidden_units: 128
          num_layers: 2
    keep_checkpoints: 5
    max_steps: 50000000 
    time_horizon: 128 
    summary_freq: 20000